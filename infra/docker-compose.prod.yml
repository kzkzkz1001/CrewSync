version: '3.9'

# Production compose — uses pre-built images from GHCR.
# Databases are NOT exposed externally; all traffic enters via Nginx.
#
# Usage:
#   docker-compose -f infra/docker-compose.prod.yml up -d
#
# Required env file: /opt/crewsync/.env  (see .env.example)

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgis/postgis:16-3.4
    <<: [*restart, *logging]
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-crewsync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-crewsync}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No external port — only accessible within Docker network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-crewsync}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    <<: [*restart, *logging]
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-changeme}', 'ping']
      interval: 10s
      retries: 5

  # ── Application services ────────────────────────────────────────────────────

  gateway:
    image: ghcr.io/${GITHUB_REPOSITORY}/crewsync-gateway:${IMAGE_TAG:-latest}
    <<: [*restart, *logging]
    env_file: .env
    environment:
      NOTIFICATION_SERVICE_URL: http://notification-service:3003
    depends_on:
      redis:
        condition: service_healthy

  shift-service:
    image: ghcr.io/${GITHUB_REPOSITORY}/crewsync-shift-service:${IMAGE_TAG:-latest}
    <<: [*restart, *logging]
    env_file: .env
    environment:
      ROUTE_ENGINE_URL: http://route-engine:3002
    depends_on:
      postgres:
        condition: service_healthy

  route-engine:
    image: ghcr.io/${GITHUB_REPOSITORY}/crewsync-route-engine:${IMAGE_TAG:-latest}
    <<: [*restart, *logging]
    env_file: .env

  notification-service:
    image: ghcr.io/${GITHUB_REPOSITORY}/crewsync-notification-service:${IMAGE_TAG:-latest}
    <<: [*restart, *logging]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: ghcr.io/${GITHUB_REPOSITORY}/crewsync-web:${IMAGE_TAG:-latest}
    <<: [*restart, *logging]
    environment:
      NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL}

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    <<: [*restart, *logging]
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment for TLS:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - gateway
      - web

volumes:
  postgres_data:
  redis_data:
